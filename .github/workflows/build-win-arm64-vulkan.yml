name: "Build Windows ARM64 + Vulkan"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-win-arm64-vulkan:
    name: Build win-arm64-vulkan
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Download latest llama.cpp release
        env:
          CI: true
        run: node ./dist/cli/cli.js source download --release latest --skipBuild --noBundle --noUsageExample

      - name: Install CMake
        shell: powershell
        run: |
          # Use CMake 3.31.7 (cmake 4.2.x has a regression with cross-compile
          # toolchain files: TryCompile fails with "no such file or directory"
          # when CMAKE_SYSTEM_NAME is set in the toolchain file)
          $cmakeVer = "3.31.7"
          $cmakeDir = "C:\cmake-$cmakeVer"
          curl.exe -L "https://github.com/Kitware/CMake/releases/download/v${cmakeVer}/cmake-${cmakeVer}-windows-x86_64.zip" -o "$env:RUNNER_TEMP\cmake.zip"
          Expand-Archive "$env:RUNNER_TEMP\cmake.zip" -DestinationPath "C:\" -Force
          Rename-Item "C:\cmake-${cmakeVer}-windows-x86_64" $cmakeDir -ErrorAction SilentlyContinue
          Add-Content $env:GITHUB_PATH "$cmakeDir\bin"
          & "$cmakeDir\bin\cmake.exe" --version

      - name: Install Ninja (official binary)
        shell: powershell
        run: |
          $ninjaVer = "1.12.1"
          $ninjaDir = "C:\ninja"
          New-Item -ItemType Directory -Force -Path $ninjaDir | Out-Null
          curl.exe -L "https://github.com/ninja-build/ninja/releases/download/v${ninjaVer}/ninja-win.zip" -o "$env:RUNNER_TEMP\ninja.zip"
          Expand-Archive "$env:RUNNER_TEMP\ninja.zip" -DestinationPath $ninjaDir -Force
          Add-Content $env:GITHUB_PATH $ninjaDir
          Write-Host "Ninja installed at $ninjaDir\ninja.exe"
          & "$ninjaDir\ninja.exe" --version

      - name: Install Vulkan SDK
        shell: powershell
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          curl.exe -o $env:RUNNER_TEMP\VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Generate ARM64 vulkan-1.lib using llvm-dlltool
        shell: powershell
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          $VulkanSDK  = "C:\VulkanSDK\${env:VULKAN_VERSION}"
          $x64Lib     = "$VulkanSDK\Lib\vulkan-1.lib"
          $arm64Dir   = "$VulkanSDK\Lib\ARM64"
          $arm64Lib   = "$arm64Dir\vulkan-1.lib"
          $llvmBin    = "C:\Program Files\LLVM\bin"
          $defFile    = "$env:RUNNER_TEMP\vulkan-1.def"

          if (Test-Path $arm64Lib) {
            Write-Host "ARM64 vulkan-1.lib already exists"
            Add-Content $env:GITHUB_ENV "NODE_LLAMA_CPP_CMAKE_OPTION_Vulkan_LIBRARY=$arm64Lib"
            exit 0
          }

          Write-Host "Generating ARM64 vulkan-1.lib..."
          $symbols = & "$llvmBin\llvm-nm.exe" --defined-only --extern-only --print-file-name "$x64Lib" 2>&1 |
            Where-Object { $_ -match " T " -or $_ -match " D " } |
            ForEach-Object { ($_ -split "\s+")[-1] }

          if ($symbols.Count -eq 0) { Write-Error "No symbols extracted"; exit 1 }
          Write-Host "Extracted $($symbols.Count) symbols"

          "LIBRARY vulkan-1" | Out-File -FilePath $defFile -Encoding ascii
          "EXPORTS"          | Out-File -FilePath $defFile -Append -Encoding ascii
          $symbols | ForEach-Object { "    $_" } | Out-File -FilePath $defFile -Append -Encoding ascii

          New-Item -ItemType Directory -Force -Path $arm64Dir | Out-Null
          & "$llvmBin\llvm-dlltool.exe" -m arm64 -D "vulkan-1.dll" -d $defFile -l $arm64Lib
          if (-not (Test-Path $arm64Lib)) { Write-Error "Failed to generate lib"; exit 1 }

          Write-Host "Generated: $arm64Lib ($((Get-Item $arm64Lib).Length) bytes)"
          Add-Content $env:GITHUB_ENV "NODE_LLAMA_CPP_CMAKE_OPTION_Vulkan_LIBRARY=$arm64Lib"

      - name: Build win-arm64-vulkan binaries
        shell: bash
        env:
          CI: true
        run: |
          node ./dist/cli/cli.js source build \
            --ciMode \
            --noUsageExample \
            --arch arm64 \
            --gpu vulkan \
            --nodeTarget 20

      - name: Collect output binaries
        shell: bash
        run: |
          mkdir -p bins
          LOCAL_BUILDS="llama/localBuilds"
          for folder in "$LOCAL_BUILDS"/*/; do
            name=$(basename "$folder")
            if [ -d "$folder/Release" ]; then
              mv "$folder/Release" "bins/$name"
              echo "Collected: bins/$name"
            fi
          done
          ls -la bins/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-llama-cpp-win-arm64-vulkan
          path: bins/
