name: "Build Windows ARM64 + Vulkan"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-win-arm64-vulkan:
    name: Build win-arm64-vulkan
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Download latest llama.cpp release
        env:
          CI: true
        run: node ./dist/cli/cli.js source download --release latest --skipBuild --noBundle --noUsageExample

      - name: Install CMake & Ninja
        run: |
          choco install cmake.install --version=4.2.1
          choco install cmake --version=4.2.1
          choco install ninja

      - name: Install Vulkan SDK
        shell: powershell
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          curl.exe -o $env:RUNNER_TEMP\VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Generate ARM64 vulkan-1.lib using llvm-dlltool
        shell: powershell
        env:
          VULKAN_VERSION: 1.4.313.2
        run: |
          $VulkanSDK  = "C:\VulkanSDK\${env:VULKAN_VERSION}"
          $x64Lib     = "$VulkanSDK\Lib\vulkan-1.lib"
          $arm64Dir   = "$VulkanSDK\Lib\ARM64"
          $arm64Lib   = "$arm64Dir\vulkan-1.lib"
          $llvmBin    = "C:\Program Files\LLVM\bin"
          $defFile    = "$env:RUNNER_TEMP\vulkan-1.def"

          # Check if ARM64 lib already exists (future SDK versions may include it)
          if (Test-Path $arm64Lib) {
            Write-Host "ARM64 vulkan-1.lib already exists at $arm64Lib"
            Add-Content $env:GITHUB_ENV "NODE_LLAMA_CPP_CMAKE_OPTION_Vulkan_LIBRARY=$arm64Lib"
            exit 0
          }

          Write-Host "Generating ARM64 vulkan-1.lib from x64 lib using llvm-dlltool..."

          # Step 1: Extract symbol names from x64 vulkan-1.lib using llvm-nm
          $nmExe = "$llvmBin\llvm-nm.exe"
          if (-not (Test-Path $nmExe)) { $nmExe = "llvm-nm.exe" }
          Write-Host "Using llvm-nm: $nmExe"

          $symbols = & $nmExe --defined-only --extern-only --print-file-name "$x64Lib" 2>&1 |
            Where-Object { $_ -match " T " -or $_ -match " D " } |
            ForEach-Object { ($_ -split "\s+")[-1] }

          if ($symbols.Count -eq 0) {
            Write-Error "Failed to extract symbols from $x64Lib"
            exit 1
          }
          Write-Host "Extracted $($symbols.Count) symbols"

          # Step 2: Write .def file
          "LIBRARY vulkan-1" | Out-File -FilePath $defFile -Encoding ascii
          "EXPORTS" | Out-File -FilePath $defFile -Append -Encoding ascii
          $symbols | ForEach-Object { "    $_" } | Out-File -FilePath $defFile -Append -Encoding ascii
          Write-Host "DEF file written to $defFile"

          # Step 3: Generate ARM64 import lib using llvm-dlltool
          $dlltoolExe = "$llvmBin\llvm-dlltool.exe"
          if (-not (Test-Path $dlltoolExe)) { $dlltoolExe = "llvm-dlltool.exe" }
          Write-Host "Using llvm-dlltool: $dlltoolExe"

          New-Item -ItemType Directory -Force -Path $arm64Dir | Out-Null
          & $dlltoolExe -m arm64 -D "vulkan-1.dll" -d $defFile -l $arm64Lib
          if (-not (Test-Path $arm64Lib)) {
            Write-Error "Failed to generate ARM64 vulkan-1.lib"
            exit 1
          }
          Write-Host "Successfully generated ARM64 vulkan-1.lib at $arm64Lib"
          Get-Item $arm64Lib | Select-Object FullName, Length

          # Export to cmake
          Add-Content $env:GITHUB_ENV "NODE_LLAMA_CPP_CMAKE_OPTION_Vulkan_LIBRARY=$arm64Lib"

      - name: Build win-arm64-vulkan binaries
        shell: bash
        env:
          CI: true
        run: |
          node ./dist/cli/cli.js source build \
            --ciMode \
            --noUsageExample \
            --arch arm64 \
            --gpu vulkan \
            --nodeTarget 20

      - name: Collect output binaries
        shell: bash
        run: |
          mkdir -p bins
          LOCAL_BUILDS="llama/localBuilds"
          for folder in "$LOCAL_BUILDS"/*/; do
            name=$(basename "$folder")
            if [ -d "$folder/Release" ]; then
              mv "$folder/Release" "bins/$name"
              echo "Collected: bins/$name"
            fi
          done
          ls -la bins/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-llama-cpp-win-arm64-vulkan
          path: bins/
